<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L'ARTISAN DOUX — 零重力錯落漂浮點心全景實驗室</title>
  <meta name="description" content="全螢幕去背點心主體，大小錯落排列，從四面八方飛入畫面，零重力持續多向緩慢漂浮。">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ========================================================================
       全螢幕動態背景層 (動圖極光與粒子特效撐滿全畫面)
       ======================================================================== -->
  <div class="fullscreen-bg">
    <!-- 漸層極光動畫層 -->
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>
    <div class="aurora aurora-3"></div>
    <!-- 懸浮光點 / 星屑粒子特效層 -->
    <div id="particles-container" class="particles-container"></div>
    <!-- 科技微格線與深邃暗角 -->
    <div class="bg-grid"></div>
    <div class="bg-vignette"></div>
  </div>

  <!-- ========================================================================
       頂部輕量導覽與控制台
       ======================================================================== -->
  <header class="top-nav">
    <div class="nav-brand">
      <span class="brand-badge">ZERO-G LAB</span>
      <h1>L'ARTISAN DOUX · 零重力錯落漂浮點心</h1>
    </div>
    <div class="nav-actions">
      <button id="btn-reset-view" class="btn btn-glass hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        返回零重力總覽
      </button>
      <button id="btn-toggle-drift" class="btn btn-secondary" title="暫停或繼續空間漂浮">
        <svg id="icon-drift" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        <span>漂浮中 (暫停)</span>
      </button>
      <button id="btn-replay" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        重新四面八方飛入
      </button>
      <button id="btn-theme" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        切換光影
      </button>
    </div>
  </header>

  <!-- ========================================================================
       主舞台全螢幕畫布 (10 款去背點心穿插交錯排列並持續多向緩慢漂浮)
       ======================================================================== -->
  <main id="stage" class="stage">
    <!-- 去背點心將由 script.js 根據尺寸階層與物理引擎動態生成在畫布上 -->
  </main>

  <!-- ========================================================================
       左側點心詳細說明卡
       ======================================================================== -->
  <aside id="info-panel" class="info-panel hidden">
    <div class="info-card-glass">
      <div class="info-header">
        <span id="info-badge" class="info-badge">👑 主廚嚴選</span>
        <span id="info-price" class="info-price">$28</span>
      </div>
      
      <h2 id="info-title" class="info-title">皇室草莓香草聖布蕾</h2>
      <p id="info-subtitle" class="info-subtitle italic-serif">Royal Strawberry Vanilla Dome</p>
      
      <div class="info-divider"></div>
      
      <p id="info-desc" class="info-desc">
        甄選法國馬達加斯加頂級香草莢與日本福岡頂級甘王草莓，慢火蒸烤出如絲綢般細膩的香草布蕾，搭配酥脆法式千層餅底，在舌尖綻放層次豐富的微酸與濃郁甘甜。
      </p>

      <!-- 風味雷達 / 規格條 -->
      <div class="flavor-specs">
        <div class="spec-row">
          <span>甜度指數</span>
          <div class="progress-bar"><div id="bar-sweetness" class="progress-val" style="width: 80%;"></div></div>
        </div>
        <div class="spec-row">
          <span>濃郁度</span>
          <div class="progress-bar"><div id="bar-richness" class="progress-val" style="width: 90%;"></div></div>
        </div>
        <div class="spec-row">
          <span>口感層次</span>
          <div class="progress-bar"><div id="bar-texture" class="progress-val" style="width: 95%;"></div></div>
        </div>
      </div>

      <!-- 操作按鈕 -->
      <div class="info-actions">
        <button id="btn-order" class="btn btn-primary btn-large" onclick="alert('已為您將此款美味點心加入預訂單！');">
          <span>立即預訂品嚐</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        </button>
        <button id="btn-close-info" class="btn btn-secondary btn-icon" title="返回總覽">
          ✖
        </button>
      </div>
    </div>
  </aside>

  <!-- ========================================================================
       底部提示列
       ======================================================================== -->
  <footer class="bottom-hint">
    <div class="hint-content">
      <span class="status-dot"></span>
      <span id="hint-text">💡 零重力指南：點選頂部**「重新四面八方飛入」**，每次進場**方向完全不同**且**大小隨機重新洗牌、穿插交錯**！</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
